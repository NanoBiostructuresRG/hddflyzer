name: Publish Python package to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.5"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Validate release tag
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Input tag must look like vX.Y.Z, for example v0.1.5"
              exit 1
              ;;
          esac

          git fetch --tags --force
          git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify package version matches tag
        run: |
          expected="${{ inputs.tag }}"
          expected="${expected#v}"
          actual="$(python -c "import runpy; print(runpy.run_path('hddflyzer/version.py')['__version__'])")"

          if [ "$actual" != "$expected" ]; then
            echo "Package version $actual does not match tag ${{ inputs.tag }}"
            exit 1
          fi

      - name: Install package with development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests -q

      - name: Import smoke
        run: python -c "import hddflyzer; print(hddflyzer.__version__)"

      - name: CLI smoke
        run: |
          hddflyzer --version
          hddflyzer
          hddflyzer pipeline

  build:
    name: Build distribution
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Validate release tag
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Input tag must look like vX.Y.Z, for example v0.1.5"
              exit 1
              ;;
          esac

          git fetch --tags --force
          git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify package version matches tag
        run: |
          expected="${{ inputs.tag }}"
          expected="${expected#v}"
          actual="$(python -c "import runpy; print(runpy.run_path('hddflyzer/version.py')['__version__'])")"

          if [ "$actual" != "$expected" ]; then
            echo "Package version $actual does not match tag ${{ inputs.tag }}"
            exit 1
          fi

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/hddflyzer

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
